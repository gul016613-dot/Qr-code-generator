<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free QR Code Generator | Create QR Codes Online</title>
<meta name="description" content="Generate free QR codes online. Create QR codes for URLs, text, email, phone, WiFi and more.">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<header>
    <h1>QR Code Generator</h1>
</header>

<div class="container">

    <!-- Ad Space 1 -->
    <div class="ad-box">
        Google AdSense Banner
    </div>

    <div class="card">

        <input
        type="text"
        id="qrText"
        placeholder="Enter text or URL">

        <button onclick="generateQR()">
            Generate QR Code
        </button>

        <button onclick="downloadQR()">
            Download PNG
        </button>

        <div id="qrcode"></div>

    </div>

    <!-- Ad Space 2 -->
    <div class="ad-box">
        300x250 Ad
    </div>

    <section>

        <h2>How to Use</h2>

        <p>
            Enter your text or website URL, click Generate,
            then download your QR Code instantly.
        </p>

    </section>

    <!-- Ad Space 3 -->
    <div class="ad-box">
        Ad Space
    </div>

    <section>

        <h2>Frequently Asked Questions</h2>

        <h3>Is it free?</h3>

        <p>Yes, 100% free.</p>

        <h3>Need login?</h3>

        <p>No registration required.</p>

    </section>

    <!-- Ad Space 4 -->
    <div class="ad-box">
        Footer Ad
    </div>

</div>

<footer>

© 2026 QR Code Generator

</footer>

<script src="script.js"></script>

</body>
</html>
